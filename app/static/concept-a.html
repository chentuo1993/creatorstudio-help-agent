<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Creator Studio Help — Concept A</title>
  <style>
    :root {
      --bg-1: #ffd6f0; --bg-2: #c8e3ff; --bg-3: #fff0c2;
      --fg: #1d1d1f; --fg-dim: #6e6e73;
      --card: rgba(255,255,255,0.62);
      --border: rgba(255,255,255,0.55);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-1: #2c1140; --bg-2: #0a2540; --bg-3: #3b0a30;
        --fg: #f5f5f7; --fg-dim: #a1a1a6;
        --card: rgba(28,28,30,0.55);
        --border: rgba(255,255,255,0.10);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      color: var(--fg);
      background:
        radial-gradient(60% 50% at 15% 0%, var(--bg-1) 0%, transparent 60%),
        radial-gradient(70% 60% at 85% 10%, var(--bg-2) 0%, transparent 60%),
        radial-gradient(80% 70% at 50% 100%, var(--bg-3) 0%, transparent 60%),
        #faf9fb;
      background-attachment: fixed;
      animation: drift 30s ease-in-out infinite alternate;
    }
    @media (prefers-color-scheme: dark) { body { background-color: #0a0a0c; } }
    @keyframes drift {
      from { background-position: 0 0, 0 0, 0 0, 0 0; }
      to { background-position: 5% 5%, -5% 8%, 8% -3%, 0 0; }
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 56px 20px 80px; }

    .hero { text-align: center; margin-bottom: 36px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: 999px;
      background: var(--card); backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--border); font-size: 0.78rem; color: var(--fg-dim);
    }
    .ai-glow {
      width: 8px; height: 8px; border-radius: 50%;
      background: conic-gradient(from 0deg, #FF3B30, #FFB200, #34C759, #0A84FF, #BF5AF2, #FF3B30);
      animation: spin 4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 2.4rem; font-weight: 700; letter-spacing: -0.02em;
      margin: 16px 0 8px;
      background: linear-gradient(120deg, #FF3B30, #FF9500, #FFCC00, #34C759, #0A84FF, #BF5AF2);
      background-size: 300% 300%;
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: shimmer 6s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .sub { color: var(--fg-dim); font-size: 1.05rem; max-width: 480px; margin: 0 auto; }

    .apps {
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      margin: 28px 0 24px;
    }
    .app-chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px 6px 6px; border-radius: 999px;
      background: var(--card); backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--border); font-size: 0.85rem;
      color: var(--fg); cursor: default;
    }

    .ask-card {
      background: var(--card); backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--border); border-radius: 22px;
      padding: 14px 16px;
      box-shadow: 0 30px 60px -30px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .ask-card form { display: flex; gap: 10px; align-items: center; }
    .ask-card input {
      flex: 1; padding: 12px 8px; border: none; outline: none;
      background: transparent; color: var(--fg); font-size: 1.05rem;
      font-family: inherit;
    }
    .ask-card input::placeholder { color: var(--fg-dim); }
    .ask-btn {
      padding: 10px 18px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, #0A84FF, #BF5AF2);
      color: white; font-weight: 600; cursor: pointer; font-size: 0.95rem;
      transition: transform 0.15s ease;
    }
    .ask-btn:hover { transform: translateY(-1px); }
    .ask-btn[disabled] { opacity: 0.5; cursor: progress; }

    .suggestions {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; padding: 0 4px;
    }
    .suggest {
      padding: 6px 12px; border-radius: 999px; font-size: 0.83rem;
      background: rgba(127,127,127,0.10); border: 1px solid var(--border);
      color: var(--fg-dim); cursor: pointer; transition: all 0.15s;
    }
    .suggest:hover { color: var(--fg); background: rgba(127,127,127,0.18); }

    .answer-card {
      margin-top: 26px;
      background: var(--card); backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--border); border-radius: 22px;
      padding: 24px 26px;
      box-shadow: 0 30px 60px -30px rgba(0,0,0,0.25);
      animation: fadein 0.4s ease;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .answer-card .pill-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .answer-card .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px 4px 4px; border-radius: 999px;
      background: rgba(127,127,127,0.12); font-size: 0.78rem; color: var(--fg);
    }
    .answer-card p { line-height: 1.65; margin: 0 0 12px; }
    .answer-card h2, .answer-card h3 { margin-top: 16px; font-weight: 600; }
    .answer-card ul { padding-left: 22px; margin: 8px 0; }
    .answer-card li { margin: 4px 0; line-height: 1.6; }
    .answer-card sup.cite { color: #0A84FF; font-weight: 600; cursor: pointer; }
    .answer-card code { background: rgba(127,127,127,0.15); padding: 1px 6px; border-radius: 4px; font-size: 0.92em; }

    .citations { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
    .citations h4 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-dim); margin: 0 0 10px; font-weight: 600; }
    .citations a {
      display: flex; align-items: flex-start; gap: 10px; padding: 10px;
      border-radius: 12px; text-decoration: none; color: var(--fg);
      transition: background 0.15s;
    }
    .citations a:hover { background: rgba(127,127,127,0.10); }
    .citations .num { color: #0A84FF; font-weight: 700; font-size: 0.85rem; min-width: 18px; }
    .citations .title { font-size: 0.92rem; }
    .citations .crumbs { font-size: 0.78rem; color: var(--fg-dim); margin-top: 2px; }

    .empty { color: var(--fg-dim); text-align: center; padding: 32px 0; font-size: 0.95rem; }
    .thinking { display: inline-flex; gap: 4px; }
    .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-dim); animation: bounce 1.2s infinite; }
    .thinking span:nth-child(2) { animation-delay: 0.15s; }
    .thinking span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-6px); opacity: 1; } }

    .thread { margin-top: 22px; display: flex; flex-direction: column; gap: 14px; }
    .bubble { max-width: 92%; border-radius: 18px; padding: 12px 16px; font-size: 0.98rem; line-height: 1.45; }
    .bubble.user {
      align-self: flex-end;
      background: rgba(10, 132, 255, 0.14);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge"><span class="ai-glow"></span> Apple Intelligence · grounded in official docs</div>
      <h1>Creator Studio Help</h1>
      <p class="sub">Ask anything about Final Cut Pro, Logic Pro, Pixelmator Pro, Motion, Compressor, MainStage, Keynote, Pages, Numbers, or Freeform.</p>
      <div class="apps" id="apps"></div>
    </div>

    <div class="ask-card">
      <form id="f">
        <input id="q" type="text" placeholder="What is the Magnetic Timeline?" autocomplete="off" autofocus />
        <button class="ask-btn" id="b" type="submit">Ask</button>
      </form>
      <div class="suggestions" id="sugs"></div>
    </div>

    <p style="text-align:right; margin: 0 0 0 0;">
      <button type="button" id="newchat" class="suggest" style="font-size:0.8rem; padding:4px 12px;">New chat</button>
    </p>

    <div class="thread" id="out"></div>
  </div>

  <script src="/static/icons.js"></script>
  <script src="/static/api.js"></script>
  <script>
    const SUGS = [
      "What is the Magnetic Timeline?",
      "How do I import media from my iPhone?",
      "What's included in Apple Creator Studio?",
      "How do I edit videos to the rhythm of music?",
    ];

    const apps = document.getElementById('apps');
    APP_ICONS.list().slice(0, 8).forEach(name => {
      const c = document.createElement('div');
      c.className = 'app-chip';
      c.innerHTML = APP_ICONS.get(name, 22) + '<span>' + name + '</span>';
      apps.appendChild(c);
    });

    const sugs = document.getElementById('sugs');
    SUGS.forEach(text => {
      const b = document.createElement('button');
      b.className = 'suggest'; b.type = 'button'; b.textContent = text;
      b.onclick = () => { document.getElementById('q').value = text; document.getElementById('f').requestSubmit(); };
      sugs.appendChild(b);
    });

    const out = document.getElementById('out');
    /** @type {{role:string, content:string, citations?:*, matched_apps?:*}}[] */
    let convo = [];

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderAsst(m) {
      const body = m.content;
      const apps = (m.matched_apps || []).map(a =>
        `<span class="pill">${APP_ICONS.get(a, 18)}${a}</span>`).join('');
      const cites = (m.citations || []).map(c =>
        `<a href="${c.url}" target="_blank" rel="noreferrer">
           <span class="num">[${c.n}]</span>
           <span>
             <div class="title">${c.app} — ${c.breadcrumbs.length ? c.breadcrumbs.join(' › ') : c.title}</div>
             <div class="crumbs">${c.url.replace('https://support.apple.com', '')}</div>
           </span>
         </a>`).join('');
      return `
        <div class="answer-card" style="margin-top:0;">
          ${apps ? `<div class="pill-row">${apps}</div>` : ''}
          ${HelpAgent.renderMarkdown(body)}
          ${cites ? `<div class="citations"><h4>Sources</h4>${cites}</div>` : ''}
        </div>`;
    }

    function drawThread(loading) {
      let html = '';
      for (const m of convo) {
        if (m.role === 'user') {
          html += `<div class="bubble user">${esc(m.content)}</div>`;
        } else {
          html += renderAsst(m);
        }
      }
      if (loading) {
        html += `<div class="answer-card"><p class="empty"><span class="thinking"><span></span><span></span><span></span></span></p></div>`;
      }
      out.innerHTML = html;
      out.scrollTop = out.scrollHeight;
    }

    document.getElementById('newchat').addEventListener('click', () => {
      convo = [];
      drawThread(false);
    });

    document.getElementById('f').addEventListener('submit', async (e) => {
      e.preventDefault();
      const qel = document.getElementById('q');
      const q = qel.value.trim();
      if (!q) return;
      const btn = document.getElementById('b');
      btn.disabled = true;
      convo.push({ role: 'user', content: q });
      qel.value = '';
      drawThread(true);
      const hist = convo
        .slice(0, -1)
        .map(({ role, content }) => ({ role, content }));
      try {
        const data = await HelpAgent.ask(q, hist);
        convo.push({ role: 'assistant', content: data.answer, citations: data.citations, matched_apps: data.matched_apps });
        drawThread(false);
      } catch (err) {
        convo.push({ role: 'assistant', content: '**Error:** ' + err.message, matched_apps: [], citations: [] });
        drawThread(false);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
